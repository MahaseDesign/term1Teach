<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y8 Data L6 — Full Review</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#2d3318;--surface:#3a4220;--surface2:#454e27;--border:#5a6632;
  --accent:#c8e06e;--accent2:#e8c84e;--text:#f0f2e0;--muted:#9aA878;
  --success:#6ec87a;--warning:#e8c84e;--danger:#e07060;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;}
.presentation{display:flex;flex-direction:column;height:100vh;}
.progress-bar{height:4px;background:var(--border);flex-shrink:0;}
.progress-fill{height:100%;background:var(--accent);transition:width 0.5s ease;}
.slide-area{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.slide{width:100%;max-width:940px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:44px 52px;position:relative;overflow-y:auto;max-height:calc(100vh - 130px);animation:sIn 0.3s ease;}
@keyframes sIn{from{opacity:0;transform:translateX(18px);}to{opacity:1;transform:none;}}
.slide::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),transparent);}
.eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.stype{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:3px 10px;border-radius:5px;display:inline-block;}
.t-intro   {background:rgba(200,224,110,.15);color:#c8e06e;border:1px solid rgba(200,224,110,.35);}
.t-concept {background:rgba(232,200,78,.15);color:#e8c84e;border:1px solid rgba(232,200,78,.35);}
.t-activity{background:rgba(255,160,80,.15);color:#ffa050;border:1px solid rgba(255,160,80,.35);}
.t-summary {background:rgba(110,200,122,.15);color:#6ec87a;border:1px solid rgba(110,200,122,.35);}
.t-compete {background:rgba(232,200,78,.15);color:#e8c84e;border:1px solid rgba(232,200,78,.35);}
.snum{font-family:var(--mono);font-size:11px;color:var(--muted);}
.slide h1{font-size:clamp(20px,3.5vw,32px);font-weight:700;line-height:1.2;margin-bottom:16px;color:var(--text);}
.sb{color:var(--muted);font-size:15px;line-height:1.8;}
.sb ul,.sb ol{padding-left:22px;}
.sb li{margin-bottom:7px;}
.sb li::marker{color:var(--accent);}
.sb strong{color:var(--text);}
.sb p{margin-bottom:12px;}
.sb p:last-child{margin-bottom:0;}
code{font-family:var(--mono);background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:5px;font-size:13px;color:var(--accent);}
pre{font-family:var(--mono);background:var(--surface2);border:1px solid var(--border);padding:16px 20px;border-radius:10px;font-size:13px;color:var(--accent);overflow-x:auto;margin:12px 0;line-height:1.7;}
.callout{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:14px 18px;margin:14px 0;font-size:14px;color:var(--text);}
.callout.warn{border-left-color:var(--warning);background:rgba(232,200,78,.08);}
.callout.success{border-left-color:var(--success);background:rgba(110,200,122,.08);}
.callout.danger{border-left-color:var(--danger);background:rgba(224,112,96,.08);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:14px 0;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:14px 0;}
.card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.card h4{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:10px;}
.bit-table{width:100%;border-collapse:collapse;margin:14px 0;font-family:var(--mono);}
.bit-table th{background:var(--surface2);padding:9px 12px;border:1px solid var(--border);text-align:center;font-size:13px;color:var(--accent);}
.bit-table td{padding:9px 12px;border:1px solid var(--border);text-align:center;font-size:13px;}
.bit-table tr:nth-child(even) td{background:rgba(255,255,255,.03);}
.bit-hi{background:rgba(200,224,110,.18)!important;color:var(--accent);font-weight:700;}
.task-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;margin:14px 0;}
.task-box h4{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text);}
.answer-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.answer-row label{font-size:13px;color:var(--muted);min-width:260px;flex:1 1 260px;line-height:1.5;}
.ans-input{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 12px;color:var(--text);font-family:var(--mono);font-size:14px;width:clamp(140px,30vw,300px);text-align:left;transition:border-color .2s;}
.ans-input:focus{outline:none;border-color:var(--accent);}
.check-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.check-btn:hover{background:var(--accent);color:#1a1e08;}
.fb{font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;display:none;}
.fb.ok{background:rgba(110,200,122,.15);color:var(--success);border:1px solid var(--success);display:inline-block;}
.fb.no{background:rgba(224,112,96,.15);color:var(--danger);border:1px solid var(--danger);display:inline-block;}
.compete-board{background:var(--surface2);border:2px solid var(--warning);border-radius:14px;padding:20px;margin:14px 0;}
.score-display{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--warning);text-align:center;margin:10px 0;}
.timer-bar{height:8px;background:var(--border);border-radius:4px;margin:8px 0;overflow:hidden;}
.timer-fill{height:100%;background:var(--warning);border-radius:4px;transition:width 1s linear;}
.compete-input{background:var(--bg);border:2px solid var(--warning);border-radius:8px;padding:10px 16px;color:var(--text);font-family:var(--mono);font-size:18px;width:100%;text-align:center;margin:10px 0;}
.compete-input:focus{outline:none;}
.compete-btn{padding:10px 28px;border-radius:8px;border:none;background:var(--warning);color:#1a1e08;font-weight:700;font-size:14px;cursor:pointer;width:100%;margin-top:6px;}
.compete-q{font-size:17px;font-weight:700;text-align:center;padding:14px;color:var(--text);min-height:52px;}
.leaderboard{list-style:none;margin-top:10px;}
.leaderboard li{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;font-size:13px;margin-bottom:4px;background:rgba(232,200,78,.07);border:1px solid rgba(232,200,78,.18);}
.lb-pos{font-family:var(--mono);font-size:12px;color:var(--warning);width:24px;}
.lb-name{flex:1;font-weight:600;}
.lb-score{font-family:var(--mono);font-size:13px;color:var(--warning);}
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface);}
.nav-btn{padding:8px 22px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .2s;}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.nav-btn.primary{background:var(--accent);color:#1a1e08;border-color:var(--accent);font-weight:700;}
.nav-center{display:flex;flex-direction:column;align-items:center;gap:6px;}
.dot-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:320px;}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s;flex-shrink:0;}
.pdot.active{background:var(--accent);transform:scale(1.4);}
.pdot.done{background:var(--muted);}
.pdot.cdot{background:rgba(232,200,78,.35);}
.pdot.cdot.active{background:var(--warning);}
.sctr{font-family:var(--mono);font-size:11px;color:var(--muted);}
.kbhint{font-size:11px;color:var(--muted);}
@media(max-width:640px){.slide{padding:22px 16px;}.two-col,.three-col{grid-template-columns:1fr;}.nav-btn{padding:7px 12px;font-size:12px;}}
</style>
</head>
<body>
<div class="presentation">
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="slide-area"><div class="slide" id="slide"></div></div>
  <div class="nav-bar">
    <button class="nav-btn" id="prev-btn" onclick="goPrev()">← Back</button>
    <div class="nav-center">
      <div class="dot-row" id="dots"></div>
      <div class="sctr" id="sctr">1 / 1</div>
      <div class="kbhint">← → Space to navigate</div>
    </div>
    <button class="nav-btn primary" id="next-btn" onclick="goNext()">Next →</button>
  </div>
</div>
<script>
const LESSON_ID = 'y8h6';
const SLIDES = [{"type": "intro", "title": "Data Representation — Full Review", "body": "<p>This final lesson brings together <strong>everything</strong> from the Year 8 data representation unit. We'll see how hex, images, sound and compression all connect.</p>\n<div class=\"three-col\">\n<div class=\"card\"><h4>L1 — Hex Intro</h4><p>Binary↔Hex, nibbles, byte = 2 hex digits</p></div>\n<div class=\"card\"><h4>L2 — Hex↔Denary</h4><p>Place values of 16, conversion methods</p></div>\n<div class=\"card\"><h4>L3 — Colour Codes</h4><p>#RRGGBB format, RGB mixing</p></div>\n</div>\n<div class=\"three-col\">\n<div class=\"card\"><h4>L4 — Images</h4><p>Pixels, resolution, colour depth, file size</p></div>\n<div class=\"card\"><h4>L5 — Sound</h4><p>Sampling, sample rate, bit depth, compression</p></div>\n<div class=\"card\"><h4>L6 — Review</h4><p>All topics together — exam-style practice</p></div>\n</div>"}, {"type": "concept", "title": "The Big Picture — How Data Connects", "body": "<p>Everything in computing reduces to binary. Hexadecimal is just a shorthand layer on top:</p>\n<table class=\"bit-table\"><tr><th>Data type</th><th>Stored as</th><th>Hex used for</th></tr>\n<tr><td>Integers</td><td>Binary bits</td><td>Memory addresses, debugging</td></tr>\n<tr><td>Text (ASCII)</td><td>7/8-bit codes</td><td>Character codes in editors</td></tr>\n<tr><td>Colours</td><td>3 × 8-bit RGB</td><td>#RRGGBB colour codes</td></tr>\n<tr><td>Images</td><td>Grid of pixel colour values</td><td>Hex colour values per pixel</td></tr>\n<tr><td>Sound</td><td>Sequence of amplitude samples</td><td>Audio memory values</td></tr>\n<tr><td>Network IDs</td><td>Binary addresses</td><td>MAC and IPv6 addresses</td></tr></table>"}, {"type": "concept", "title": "Key Formulas Recap", "body": "<div class=\"two-col\">\n<div class=\"card\"><h4>Hex ↔ Denary</h4><p>Place values: 1, 16, 256...<br>FF = (15×16)+15 = 255<br>2B = (2×16)+11 = 43</p></div>\n<div class=\"card\"><h4>Hex ↔ Binary</h4><p>One nibble (4 bits) = one hex digit<br>1010 = A, 1111 = F<br>FA = 1111 1010</p></div>\n</div>\n<div class=\"two-col\">\n<div class=\"card\"><h4>Image file size</h4><p>W × H × Colour depth ÷ 8 = bytes<br>e.g. 100×100×24 ÷ 8 = 30,000 bytes</p></div>\n<div class=\"card\"><h4>Sound file size</h4><p>Rate × Depth × Duration × Channels ÷ 8 = bytes<br>e.g. 44100×16×1×2 ÷ 8 ≈ 176 KB</p></div>\n</div>\n<div class=\"callout success\">✓ Know these four formulas — they appear in almost every data representation exam question!</div>"}, {"type": "concept", "title": "Compression Summary", "body": "<table class=\"bit-table\"><tr><th>Method</th><th>Type</th><th>Formats</th><th>Data lost?</th></tr>\n<tr><td>JPEG</td><td>Lossy</td><td>Images</td><td>Yes — permanent</td></tr>\n<tr><td>MP3/AAC</td><td>Lossy</td><td>Audio</td><td>Yes — permanent</td></tr>\n<tr><td>H.264</td><td>Lossy</td><td>Video</td><td>Yes — permanent</td></tr>\n<tr><td>PNG</td><td>Lossless</td><td>Images</td><td>No</td></tr>\n<tr><td>FLAC</td><td>Lossless</td><td>Audio</td><td>No</td></tr>\n<tr><td>ZIP/7Z</td><td>Lossless</td><td>Any file</td><td>No</td></tr>\n<tr><td>RLE</td><td>Lossless</td><td>Simple images</td><td>No</td></tr></table>\n<div class=\"callout\">💡 <strong>When to use lossy:</strong> streaming, web, casual use. <strong>When to use lossless:</strong> medical images, archiving, audio mastering.</div>"}, {"type": "concept", "title": "Colour Depth & Quality Tradeoffs", "body": "<p>Higher quality always means larger file size. This is a fundamental tradeoff in data representation:</p>\n<table class=\"bit-table\"><tr><th>Increase this...</th><th>Effect on quality</th><th>Effect on size</th></tr>\n<tr><td>Image resolution (2×)</td><td>More detail</td><td>4× bigger</td></tr>\n<tr><td>Image colour depth (2×)</td><td>More colours</td><td>2× bigger</td></tr>\n<tr><td>Audio sample rate (2×)</td><td>Higher freq. captured</td><td>2× bigger</td></tr>\n<tr><td>Audio bit depth (2×)</td><td>Less noise</td><td>2× bigger</td></tr></table>\n<div class=\"two-col\">\n<div class=\"card\"><h4>When quality matters more</h4><p>Medical scans, professional photography, studio music — use highest quality, file size is secondary.</p></div>\n<div class=\"card\"><h4>When size matters more</h4><p>Streaming, mobile apps, web images — compress aggressively to save bandwidth and storage.</p></div>\n</div>"}, {"type": "concept", "title": "Exam-Style Review Questions", "body": "<p>Practise these typical exam scenarios:</p>\n<div class=\"callout\">Q: A 400×300 image uses 8-bit colour. Calculate the file size in KB.<br>\nA: 400 × 300 × 8 = 960,000 bits ÷ 8 = 120,000 bytes ÷ 1024 ≈ <strong>117 KB</strong></div>\n<div class=\"callout\">Q: Explain why increasing the sample rate increases audio quality.<br>\nA: More samples per second means the sound wave shape is captured more accurately, especially for high-frequency sounds. Fewer samples miss peaks and troughs in the wave.</div>\n<div class=\"callout\">Q: Give one advantage and one disadvantage of lossy compression.<br>\nA: Advantage — much smaller file size. Disadvantage — data is permanently lost and cannot be restored.</div>"}, {"type": "activity", "title": "Final Review Tasks", "body": "<div class=\"task-box\"><h4>📝 Mixed Data Representation Review</h4><div class=\"answer-row\"><label>1. Convert hex B4 to denary:</label><input class=\"ans-input\" id=\"fr1\" placeholder=\"...\"><button class=\"check-btn\" data-inp=\"fr1\" data-fb=\"ffr1\" data-ans=\"180\">Check</button><span class=\"fb\" id=\"ffr1\"></span></div><div class=\"answer-row\"><label>2. Convert denary 160 to hex:</label><input class=\"ans-input\" id=\"fr2\" placeholder=\"...\"><button class=\"check-btn\" data-inp=\"fr2\" data-fb=\"ffr2\" data-ans=\"A0|a0\">Check</button><span class=\"fb\" id=\"ffr2\"></span></div><div class=\"answer-row\"><label>3. What colour is #FF00FF?</label><input class=\"ans-input\" id=\"fr3\" placeholder=\"...\"><button class=\"check-btn\" data-inp=\"fr3\" data-fb=\"ffr3\" data-ans=\"magenta|purple|pink|magenta/purple\">Check</button><span class=\"fb\" id=\"ffr3\"></span></div><div class=\"answer-row\"><label>4. File size in bytes of a 50×50, 24-bit image:</label><input class=\"ans-input\" id=\"fr4\" placeholder=\"...\"><button class=\"check-btn\" data-inp=\"fr4\" data-fb=\"ffr4\" data-ans=\"7500|7,500\">Check</button><span class=\"fb\" id=\"ffr4\"></span></div><div class=\"answer-row\"><label>5. What is the CD quality sample rate?</label><input class=\"ans-input\" id=\"fr5\" placeholder=\"...\"><button class=\"check-btn\" data-inp=\"fr5\" data-fb=\"ffr5\" data-ans=\"44100|44100 Hz|44.1 kHz|44.1khz\">Check</button><span class=\"fb\" id=\"ffr5\"></span></div><div class=\"answer-row\"><label>6. JPEG is lossy or lossless?</label><input class=\"ans-input\" id=\"fr6\" placeholder=\"...\"><button class=\"check-btn\" data-inp=\"fr6\" data-fb=\"ffr6\" data-ans=\"lossy\">Check</button><span class=\"fb\" id=\"ffr6\"></span></div><div class=\"answer-row\"><label>7. PNG is lossy or lossless?</label><input class=\"ans-input\" id=\"fr7\" placeholder=\"...\"><button class=\"check-btn\" data-inp=\"fr7\" data-fb=\"ffr7\" data-ans=\"lossless\">Check</button><span class=\"fb\" id=\"ffr7\"></span></div><div class=\"answer-row\"><label>8. What does RLE stand for?</label><input class=\"ans-input\" id=\"fr8\" placeholder=\"...\"><button class=\"check-btn\" data-inp=\"fr8\" data-fb=\"ffr8\" data-ans=\"Run Length Encoding|run length encoding|run-length encoding\">Check</button><span class=\"fb\" id=\"ffr8\"></span></div><div class=\"answer-row\"><label>9. Convert hex FA to binary:</label><input class=\"ans-input\" id=\"fr9\" placeholder=\"...\"><button class=\"check-btn\" data-inp=\"fr9\" data-fb=\"ffr9\" data-ans=\"11111010\">Check</button><span class=\"fb\" id=\"ffr9\"></span></div><div class=\"answer-row\"><label>10. How many colours in 24-bit true colour?</label><input class=\"ans-input\" id=\"fr10\" placeholder=\"...\"><button class=\"check-btn\" data-inp=\"fr10\" data-fb=\"ffr10\" data-ans=\"16777216|16.7 million|16,777,216\">Check</button><span class=\"fb\" id=\"ffr10\"></span></div></div>"}, {"type": "summary", "title": "Year 8 Data Representation Summary", "body": "<h3>Everything you have learned:</h3>\n<ul>\n<li>Hex is base 16: 0–9 then A(10)–F(15). One hex digit = 4 bits</li>\n<li>FF hex = 255 denary = 11111111 binary</li>\n<li>Colour codes: #RRGGBB — two hex digits per colour channel</li>\n<li>Image file size = W × H × colour depth ÷ 8 (bytes)</li>\n<li>Sound stored by sampling — sample rate (Hz) × bit depth × duration × channels ÷ 8</li>\n<li>CD quality: 44,100 Hz, 16-bit</li>\n<li>Lossy (MP3, JPEG): smaller, data lost permanently</li>\n<li>Lossless (FLAC, PNG, ZIP): no data lost, original restorable</li>\n<li>RLE: lossless compression storing value + repeat count</li>\n</ul>\n<div class=\"callout success\">🎉 Congratulations — you have completed the Year 8 Data Representation unit!</div>"}, {"type": "compete", "title": "🏆 Ultimate Data Representation Challenge", "body": "<div class=\"compete-board\">\n<h4>🏆 Ultimate Data Representation Challenge</h4>\n<div id=\"comp-start\">\n  <p style=\"font-size:13px;color:var(--muted);margin-bottom:10px\">15 seconds per question — faster answers score more!</p>\n  <input class=\"compete-input\" id=\"comp-name\" placeholder=\"Your name...\">\n  <button class=\"compete-btn\" onclick=\"startComp()\">🚀 Start Challenge!</button>\n  <ul class=\"leaderboard\" id=\"comp-lb\" style=\"margin-top:12px\"></ul>\n</div>\n<div id=\"comp-game\" style=\"display:none\">\n  <div style=\"display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:4px\">\n    <span id=\"comp-qn\">Q1</span><span id=\"comp-tl\" style=\"color:var(--warning)\">15s</span>\n  </div>\n  <div class=\"timer-bar\"><div class=\"timer-fill\" id=\"comp-fill\" style=\"width:100%\"></div></div>\n  <div class=\"compete-q\" id=\"comp-q\"></div>\n  <input class=\"compete-input\" id=\"comp-ans\" placeholder=\"Answer...\" autocomplete=\"off\">\n  <button class=\"compete-btn\" onclick=\"submitAns()\">Submit ↵</button>\n  <div style=\"display:flex;justify-content:space-between;margin-top:8px\">\n    <span style=\"font-size:13px;color:var(--muted)\">Score: <strong id=\"comp-score\" style=\"color:var(--warning);font-family:var(--mono)\">0</strong></span>\n    <span class=\"fb\" id=\"comp-fb\"></span>\n  </div>\n</div>\n<div id=\"comp-end\" style=\"display:none;text-align:center\">\n  <div style=\"font-size:36px;margin-bottom:8px\">🎉</div>\n  <p style=\"font-size:17px;font-weight:700\">Well done, <span id=\"comp-final-name\"></span>!</p>\n  <div class=\"score-display\" id=\"comp-final-score\">0</div>\n  <button class=\"compete-btn\" onclick=\"resetComp()\" style=\"margin-top:8px\">🔄 Play Again</button>\n  <ul class=\"leaderboard\" id=\"comp-lb-end\" style=\"margin-top:12px;text-align:left\"></ul>\n</div>\n</div>"}];
const COMP_Qs = [{"q": "Hex B4 to denary?", "answers": ["180"]}, {"q": "Denary 160 to hex?", "answers": ["A0", "a0"]}, {"q": "What colour is #FF00FF?", "answers": ["magenta", "purple"]}, {"q": "50×50 image, 24-bit. Size in bytes?", "answers": ["7500"]}, {"q": "CD quality sample rate?", "answers": ["44100", "44.1 kHz"]}, {"q": "JPEG is what type of compression?", "answers": ["lossy"]}, {"q": "PNG is what type of compression?", "answers": ["lossless"]}, {"q": "RLE stands for?", "answers": ["Run Length Encoding", "run length encoding"]}, {"q": "Convert hex FA to binary", "answers": ["11111010"]}, {"q": "24-bit true colour has how many colours?", "answers": ["16777216", "16.7 million"]}, {"q": "One hex digit represents how many bits?", "answers": ["4", "four"]}, {"q": "What is FF in denary?", "answers": ["255"]}];

function attachCheckListeners(){
  document.querySelectorAll('.check-btn[data-inp]').forEach(function(btn){
    if(btn._wired)return; btn._wired=true;
    btn.addEventListener('click',function(){
      schkAny(this.getAttribute('data-inp'),this.getAttribute('data-fb'),this.getAttribute('data-ans').split('|'));
    });
  });
}
function schkAny(iid,fid,answers){
  var clean=function(s){return String(s).toLowerCase().replace(/[^a-z0-9]/g,'');};
  var val=clean(document.getElementById(iid).value.trim());
  var ok=answers.map(clean).indexOf(val)>-1;
  var fb=document.getElementById(fid);
  fb.className='fb '+(ok?'ok':'no');
  fb.textContent=ok?'✓ Correct!':'✗ Try again — '+answers[0];
}
function schk(iid,fid,correct){schkAny(iid,fid,[correct]);}
function chk(iid,fid,correct){schkAny(iid,fid,[correct]);}
function chkAny(iid,fid,answers){schkAny(iid,fid,answers);}

var cur=0;
function render(){
  var s=SLIDES[cur];
  var tl=s.type==='compete'?'Competition':s.type.charAt(0).toUpperCase()+s.type.slice(1);
  document.getElementById('slide').innerHTML=
    '<div class="eyebrow"><span class="stype t-'+s.type+'">'+tl+'</span>'+
    '<span class="snum">Slide '+(cur+1)+' of '+SLIDES.length+'</span></div>'+
    '<h1>'+s.title+'</h1><div class="sb">'+s.body+'</div>';
  document.getElementById('prog').style.width=((cur+1)/SLIDES.length*100)+'%';
  document.getElementById('sctr').textContent=(cur+1)+' / '+SLIDES.length;
  document.getElementById('prev-btn').disabled=cur===0;
  document.getElementById('next-btn').disabled=cur===SLIDES.length-1;
  var dh='';
  SLIDES.forEach(function(sl,i){
    dh+='<div class="pdot'+(sl.type==='compete'?' cdot':'')+(i===cur?' active':i<cur?' done':'')+'" onclick="goTo('+i+')" title="'+sl.title.replace(/"/g,"'")+'"></div>';
  });
  document.getElementById('dots').innerHTML=dh;
  if(s.type==='compete'){
    var lb=JSON.parse(localStorage.getItem('tp_lb_'+LESSON_ID)||'[]');
    var el=document.getElementById('comp-lb');
    if(el)renderLB(el,lb);
  }
  attachCheckListeners();
}
function goNext(){if(cur<SLIDES.length-1){cur++;render();}}
function goPrev(){if(cur>0){cur--;render();}}
function goTo(i){cur=i;render();}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();goNext();}
  if(e.key==='ArrowLeft'){e.preventDefault();goPrev();}
});

/* Speed challenge */
var cqs=[],cIdx=0,cScore=0,cName='',cTimer=null,cRunning=false;
function startComp(){
  cName=document.getElementById('comp-name').value.trim()||'Anonymous';
  cScore=0;cIdx=0;cRunning=true;
  cqs=[].concat(COMP_Qs).sort(function(){return Math.random()-.5;});
  document.getElementById('comp-start').style.display='none';
  document.getElementById('comp-game').style.display='block';
  nextQ();
}
function nextQ(){
  if(cIdx>=cqs.length){endComp();return;}
  var q=cqs[cIdx];
  document.getElementById('comp-q').textContent=q.q;
  document.getElementById('comp-qn').textContent='Q'+(cIdx+1)+'/'+cqs.length;
  document.getElementById('comp-ans').value='';
  document.getElementById('comp-fb').className='fb';
  document.getElementById('comp-ans').focus();
  var t=15,fill=document.getElementById('comp-fill');
  fill.style.transition='none';fill.style.width='100%';
  setTimeout(function(){fill.style.transition='width 1s linear';fill.style.width='0%';},50);
  clearInterval(cTimer);
  cTimer=setInterval(function(){t--;document.getElementById('comp-tl').textContent=t+'s';if(t<=0){clearInterval(cTimer);autoNext();}},1000);
}
function autoNext(){
  if(!cRunning)return;
  var fb=document.getElementById('comp-fb');
  fb.className='fb no';fb.textContent='⏱ Time! Ans: '+cqs[cIdx].answers[0];
  cIdx++;setTimeout(nextQ,1200);
}
function submitAns(){
  if(!cRunning)return;
  clearInterval(cTimer);
  var clean=function(s){return String(s).toLowerCase().replace(/[^a-z0-9]/g,'');};
  var ans=clean(document.getElementById('comp-ans').value.trim());
  var q=cqs[cIdx],ok=q.answers.map(clean).indexOf(ans)>-1;
  var pct=parseFloat(document.getElementById('comp-fill').style.width)||0;
  var pts=ok?Math.ceil(pct/10)+10:0;
  var fb=document.getElementById('comp-fb');
  if(ok){cScore+=pts;document.getElementById('comp-score').textContent=cScore;fb.className='fb ok';fb.textContent='✓ +'+pts+' pts!';}
  else{fb.className='fb no';fb.textContent='✗ Ans: '+q.answers[0];}
  cIdx++;setTimeout(nextQ,1000);
}
document.addEventListener('keydown',function(e){
  var el=document.getElementById('comp-ans');
  if(e.key==='Enter'&&cRunning&&el&&document.activeElement===el)submitAns();
});
function endComp(){
  cRunning=false;
  document.getElementById('comp-game').style.display='none';
  document.getElementById('comp-end').style.display='block';
  document.getElementById('comp-final-name').textContent=cName;
  document.getElementById('comp-final-score').textContent=cScore;
  var lb=JSON.parse(localStorage.getItem('tp_lb_'+LESSON_ID)||'[]');
  lb.push({name:cName,score:cScore,ts:Date.now()});
  lb.sort(function(a,b){return b.score-a.score;});
  localStorage.setItem('tp_lb_'+LESSON_ID,JSON.stringify(lb.slice(0,10)));
  renderLB(document.getElementById('comp-lb-end'),lb);
}
function resetComp(){
  document.getElementById('comp-end').style.display='none';
  document.getElementById('comp-start').style.display='block';
  var lb=JSON.parse(localStorage.getItem('tp_lb_'+LESSON_ID)||'[]');
  renderLB(document.getElementById('comp-lb'),lb);
}
function renderLB(el,lb){
  if(!el)return;
  el.innerHTML=lb.slice(0,10).map(function(e,i){
    return '<li><span class="lb-pos">'+(i+1)+'</span><span class="lb-name">'+e.name+'</span><span class="lb-score">'+e.score+' pts</span></li>';
  }).join('');
}
render();

</script>
